[app]
auto_refresh_enabled = true
refresh_interval_seconds = 3

[camera]
source = "picamera2"
device_index = 0
mock_image_path = "data/snapshots/mock.jpg"
mock_video_path = ""
frame_width = 1280
frame_height = 720

[detection]
diff_interval_seconds = 1
yolo_enabled = true
yolo_interval_seconds = 8
yolo_model = "data/models/yolov8n.onnx"
empty_required_hits = 2
person_required_hits = 1
person_confidence_threshold = 0.25
diff_threshold = 30
change_ratio_threshold = 0.04
baseline_path = "data/snapshots/baseline.jpg"

[storage]
db_path = "data/status.db"
timeout_seconds = 10
busy_timeout_ms = 5000
wal_enabled = true

[privacy]
save_raw_video = false
save_snapshots = true
snapshot_interval_seconds = 30

[demo]
enabled = false
timeline_path = "demo/demo_timeline.json"
seats_path = "demo/demo_seats.json"
assets_dir = "demo/frames"
autoplay = true
show_ground_truth = true
show_detector_evidence = true

[streaming]
enabled = true
host = "0.0.0.0"
port = 8502
fps = 10
jpeg_quality = 75
